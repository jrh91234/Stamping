<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OEE Dashboard</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #fff;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
        --primary: #2563eb;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
      .container { max-width: 1150px; margin: 0 auto; padding: 24px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 14px; }
      .topbar a { color: var(--primary); text-decoration: none; font-size: 14px; }
      .status { font-size: 13px; color: var(--muted); }
      .layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
      .helper { color: var(--muted); font-size: 12px; }
      form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field.full { grid-column: span 2; }
      label { color: var(--muted); font-size: 12px; }
      input, select, textarea, button { font: inherit; }
      input, select, textarea { border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; }
      textarea { min-height: 72px; }
      .actions { display: flex; gap: 8px; grid-column: span 2; }
      button { border: 1px solid transparent; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
      .btn-primary { background: var(--primary); color: #fff; }
      .btn-secondary { border-color: var(--border); background: #fff; }
      .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
      .kpi { border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
      .kpi .label { color: var(--muted); font-size: 12px; }
      .kpi .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid var(--border); padding: 8px 6px; font-size: 13px; text-align: left; }
      th { color: var(--muted); }
      @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .kpis { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 640px) { form { grid-template-columns: 1fr; } .field.full, .actions { grid-column: auto; } .kpis { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="topbar">
        <div>
          <h1 style="margin:0">OEE Dashboard</h1>
          <div class="helper">กรอกข้อมูลการผลิต และคำนวณ OEE จาก Google Sheets</div>
        </div>
        <a href="admin.html">ไปหน้า Admin Panel</a>
      </section>

      <div id="status" class="status">พร้อมใช้งาน</div>

      <section class="layout" style="margin-top: 10px">
        <article class="card">
          <h2 style="margin-top:0">บันทึกข้อมูลผลิต</h2>
          <form id="oeeForm">
            <div class="field"><label for="date">วันที่</label><input id="date" name="date" type="date" required /></div>
            <div class="field"><label for="shift">กะ</label><select id="shift" name="shift" required><option value="Day">Day</option><option value="Night">Night</option></select></div>
            <div class="field"><label for="line">Line</label><input id="line" name="line" placeholder="Line A" required /></div>
            <div class="field"><label for="machine">Machine</label><input id="machine" name="machine" placeholder="Press-01" required /></div>
            <div class="field"><label for="plannedMinutes">Planned Time (min)</label><input id="plannedMinutes" name="plannedMinutes" type="number" min="1" required /></div>
            <div class="field"><label for="downtimeMinutes">Downtime (min)</label><input id="downtimeMinutes" name="downtimeMinutes" type="number" min="0" required /></div>
            <div class="field"><label for="totalCount">Total Count</label><input id="totalCount" name="totalCount" type="number" min="0" required /></div>
            <div class="field"><label for="goodCount">Good Count</label><input id="goodCount" name="goodCount" type="number" min="0" required /></div>
            <div class="field"><label for="idealCycleTime">Ideal Cycle Time (min/pc)</label><input id="idealCycleTime" name="idealCycleTime" type="number" min="0" step="0.0001" required /></div>
            <div class="field full"><label for="notes">หมายเหตุ</label><textarea id="notes" name="notes"></textarea></div>
            <div class="actions">
              <button type="submit" class="btn-primary">บันทึกข้อมูล</button>
              <button type="button" class="btn-secondary" id="loadBtn">โหลดข้อมูลล่าสุด</button>
            </div>
          </form>
        </article>

        <article class="card">
          <h2 style="margin-top:0">KPI (Average)</h2>
          <div class="kpis">
            <div class="kpi"><div class="label">Availability</div><div class="value" id="availabilityKpi">0.00%</div></div>
            <div class="kpi"><div class="label">Performance</div><div class="value" id="performanceKpi">0.00%</div></div>
            <div class="kpi"><div class="label">Quality</div><div class="value" id="qualityKpi">0.00%</div></div>
            <div class="kpi"><div class="label">OEE</div><div class="value" id="oeeKpi">0.00%</div></div>
          </div>

          <h3 style="margin:14px 0 8px">ข้อมูลล่าสุด</h3>
          <div style="overflow:auto">
            <table>
              <thead><tr><th>Date</th><th>Shift</th><th>Line</th><th>Machine</th><th>A</th><th>P</th><th>Q</th><th>OEE</th></tr></thead>
              <tbody id="recordsBody"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>

    <script>
      const API_URL_KEY = "oee_api_url";
      const state = { endpoint: localStorage.getItem(API_URL_KEY) || "", records: [] };

      const els = {
        status: document.getElementById("status"),
        oeeForm: document.getElementById("oeeForm"),
        loadBtn: document.getElementById("loadBtn"),
        recordsBody: document.getElementById("recordsBody"),
        availabilityKpi: document.getElementById("availabilityKpi"),
        performanceKpi: document.getElementById("performanceKpi"),
        qualityKpi: document.getElementById("qualityKpi"),
        oeeKpi: document.getElementById("oeeKpi"),
      };

      function setStatus(text, error = false) {
        els.status.textContent = text;
        els.status.style.color = error ? "#dc2626" : "#475569";
      }
      const percent = (v) => `${(Number(v || 0) * 100).toFixed(2)}%`;
      const divide = (n, d) => (Number(d) ? Number(n) / Number(d) : 0);

      function calc(row) {
        const runTime = Number(row.plannedMinutes) - Number(row.downtimeMinutes);
        const a = divide(runTime, row.plannedMinutes);
        const p = divide(Number(row.idealCycleTime) * Number(row.totalCount), runTime);
        const q = divide(row.goodCount, row.totalCount);
        return { a, p, q, oee: a * p * q };
      }

      function render() {
        if (!state.records.length) {
          els.recordsBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#64748b">ยังไม่มีข้อมูล</td></tr>';
          [els.availabilityKpi, els.performanceKpi, els.qualityKpi, els.oeeKpi].forEach((el) => (el.textContent = "0.00%"));
          return;
        }

        const sum = { a: 0, p: 0, q: 0, oee: 0 };
        els.recordsBody.innerHTML = state.records.slice(0, 30).map((row) => {
          const k = calc(row);
          sum.a += k.a; sum.p += k.p; sum.q += k.q; sum.oee += k.oee;
          return `<tr><td>${row.date || ""}</td><td>${row.shift || ""}</td><td>${row.line || ""}</td><td>${row.machine || ""}</td><td>${percent(k.a)}</td><td>${percent(k.p)}</td><td>${percent(k.q)}</td><td>${percent(k.oee)}</td></tr>`;
        }).join("");

        const n = state.records.length;
        els.availabilityKpi.textContent = percent(sum.a / n);
        els.performanceKpi.textContent = percent(sum.p / n);
        els.qualityKpi.textContent = percent(sum.q / n);
        els.oeeKpi.textContent = percent(sum.oee / n);
      }

      async function loadRecords() {
        if (!state.endpoint) throw new Error("ยังไม่ได้ตั้งค่า endpoint กรุณาไปที่ Admin Panel");
        setStatus("กำลังโหลดข้อมูล...");
        const url = new URL(state.endpoint);
        url.searchParams.set("action", "list");
        const res = await fetch(url);
        if (!res.ok) throw new Error("โหลดข้อมูลไม่สำเร็จ");
        const data = await res.json();
        state.records = Array.isArray(data.records) ? data.records : [];
        render();
        setStatus(`โหลดสำเร็จ ${state.records.length} รายการ`);
      }

      async function createRecord(payload) {
        if (!state.endpoint) throw new Error("ยังไม่ได้ตั้งค่า endpoint กรุณาไปที่ Admin Panel");
        setStatus("กำลังบันทึกข้อมูล...");
        const res = await fetch(state.endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "create", ...payload }),
        });
        if (!res.ok) throw new Error("บันทึกข้อมูลไม่สำเร็จ");
        await loadRecords();
        setStatus("บันทึกข้อมูลสำเร็จ");
      }

      function formPayload(form) {
        const fd = new FormData(form);
        const p = Object.fromEntries(fd.entries());
        ["plannedMinutes", "downtimeMinutes", "totalCount", "goodCount", "idealCycleTime"].forEach((k) => (p[k] = Number(p[k] || 0)));
        if (p.goodCount > p.totalCount) throw new Error("Good Count ต้องไม่มากกว่า Total Count");
        return p;
      }

      document.getElementById("date").valueAsDate = new Date();
      els.loadBtn.addEventListener("click", async () => { try { await loadRecords(); } catch (e) { setStatus(e.message, true); } });
      els.oeeForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        try { await createRecord(formPayload(event.currentTarget)); event.currentTarget.reset(); }
        catch (e) { setStatus(e.message, true); }
      });

      render();
    </script>
  </body>
</html>
